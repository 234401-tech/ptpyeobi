<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>여비뚝딱 · 여비정산 도구</title>
<style>
/* ============ 기본 ============ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --slate-50: #f8fafc; --slate-100: #f1f5f9; --slate-200: #e2e8f0;
  --slate-300: #cbd5e1; --slate-400: #94a3b8; --slate-500: #64748b;
  --slate-600: #475569; --slate-700: #334155; --slate-800: #1e293b;
  --slate-900: #0f172a;
  --indigo-50: #eef2ff; --indigo-100: #e0e7ff; --indigo-600: #4f46e5;
  --indigo-700: #4338ca; --indigo-800: #3730a3;
  --emerald-50: #ecfdf5; --emerald-100: #d1fae5; --emerald-500: #10b981;
  --emerald-600: #059669; --emerald-700: #047857;
  --amber-50: #fffbeb; --amber-100: #fef3c7; --amber-700: #b45309;
  --sky-50: #f0f9ff; --sky-100: #e0f2fe; --sky-700: #0369a1;
  --violet-50: #f5f3ff; --violet-100: #ede9fe; --violet-700: #6d28d9;
}
html, body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
    "Apple SD Gothic Neo", "Noto Sans KR", "맑은 고딕", sans-serif;
  color: var(--slate-900);
  background: var(--slate-50);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, select { font-family: inherit; font-size: inherit; }
svg { display: inline-block; vertical-align: middle; }
.tabular { font-variant-numeric: tabular-nums; }
.mono { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }

/* ============ 헤더 ============ */
.header { background: white; border-bottom: 1px solid var(--slate-200); }
.header-inner {
  max-width: 1400px; margin: 0 auto; padding: 14px 24px;
  display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;
}
.brand { display: flex; align-items: center; gap: 12px; }
.brand-logo {
  width: 36px; height: 36px; border-radius: 8px;
  background: linear-gradient(135deg, var(--indigo-600), var(--indigo-800));
  color: white; display: grid; place-items: center; font-weight: 700;
}
.brand-tag { font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em; color: var(--indigo-600); font-weight: 600; }
.brand-title { font-size: 14px; font-weight: 600; line-height: 1.2; }
.header-meta { display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--slate-500); flex-wrap: wrap; }
.dot-pulse {
  display: inline-block; width: 6px; height: 6px;
  border-radius: 50%; background: var(--emerald-500);
  animation: pulse 2s infinite; margin-right: 6px;
}
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

/* ============ 레이아웃 ============ */
.main {
  max-width: 1400px; margin: 0 auto; padding: 24px;
  display: grid; grid-template-columns: 1fr; gap: 20px;
}
@media (min-width: 1280px) {
  .main { grid-template-columns: 7fr 5fr; align-items: start; }
}
.col-left { display: flex; flex-direction: column; gap: 16px; }

/* ============ 카드 ============ */
.card { background: white; border: 1px solid var(--slate-200); border-radius: 8px; overflow: hidden; }
.card-header { padding: 14px 20px; border-bottom: 1px solid var(--slate-200); display: flex; align-items: center; gap: 8px; }
.card-header-num {
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--indigo-600); color: white;
  display: grid; place-items: center; font-size: 12px; font-weight: 700;
}
.card-header-title { font-size: 14px; font-weight: 600; }
.card-header-right { margin-left: auto; }

/* ============ 업로드 ============ */
.upload-wrap { padding: 0 20px 20px; }
.upload-box {
  border: 2px dashed var(--indigo-100);
  background: rgba(238, 242, 255, 0.3);
  border-radius: 8px; padding: 16px;
  display: flex; align-items: center; gap: 16px;
}
.upload-icon-wrap {
  width: 44px; height: 44px; background: white;
  border: 1px solid var(--indigo-100); border-radius: 8px;
  display: grid; place-items: center; color: var(--indigo-600);
}
.upload-info { flex: 1; min-width: 0; }
.upload-filename { font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.upload-meta { font-size: 11px; color: var(--slate-500); margin-top: 2px; display: flex; align-items: center; gap: 8px; }
.upload-meta-divider { color: var(--slate-300); }
.upload-meta-ai { color: var(--emerald-600); display: inline-flex; align-items: center; gap: 4px; }
.upload-close { color: var(--slate-400); padding: 4px; }
.upload-close:hover { color: var(--slate-700); }

/* ============ AI 배지 ============ */
.ai-badge {
  font-size: 10px; color: var(--emerald-700);
  background: var(--emerald-50); border: 1px solid var(--emerald-100);
  padding: 2px 6px; border-radius: 4px;
}

/* ============ 정보 그리드 ============ */
.info-grid {
  padding: 16px 20px;
  display: grid; grid-template-columns: 1fr 1fr;
  column-gap: 24px; row-gap: 12px;
  border-bottom: 1px solid var(--slate-100);
}
.info-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--slate-500); margin-bottom: 2px; }
.info-value { font-size: 14px; color: var(--slate-800); }
.label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--slate-500); font-weight: 600; }

/* ============ 출장 유형 세그먼트 ============ */
.mode-section { padding: 16px 20px; border-bottom: 1px solid var(--slate-100); }
.mode-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 8px; margin-top: 8px;
}
@media (min-width: 640px) { .mode-grid { grid-template-columns: repeat(4, 1fr); } }
.mode-card {
  text-align: left; padding: 10px; border-radius: 8px;
  border: 1px solid var(--slate-200); background: white;
  color: var(--slate-700); transition: all 0.15s;
}
.mode-card:hover { border-color: var(--slate-400); }
.mode-card.active { background: var(--indigo-600); border-color: var(--indigo-600); color: white; }
.mode-icon { color: var(--slate-500); display: block; }
.mode-card.active .mode-icon { color: white; }
.mode-label { font-size: 12px; font-weight: 600; margin-top: 6px; }
.mode-hint { font-size: 10px; color: var(--slate-500); margin-top: 2px; }
.mode-card.active .mode-hint { color: rgba(255, 255, 255, 0.75); }

.companions-row { margin-top: 12px; display: flex; align-items: center; gap: 12px; font-size: 12px; flex-wrap: wrap; }
.companions-note {
  font-size: 11px; color: var(--amber-700);
  background: var(--amber-50); border: 1px solid var(--amber-100);
  padding: 2px 8px; border-radius: 4px;
}

/* ============ 숙박 ============ */
.lodge-row {
  padding: 16px 20px; border-bottom: 1px solid var(--slate-100);
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
.region-select {
  font-size: 12px; border: 1px solid var(--slate-200);
  border-radius: 4px; padding: 4px 8px; background: white;
}
.region-select:disabled { background: var(--slate-50); color: var(--slate-400); }
.lodge-note {
  font-size: 11px; color: var(--indigo-700);
  background: var(--indigo-50); border: 1px solid var(--indigo-100);
  padding: 2px 8px; border-radius: 4px;
}

/* ============ 카운터 ============ */
.counter {
  display: inline-flex; align-items: center;
  border: 1px solid var(--slate-300); border-radius: 4px;
  overflow: hidden; background: white;
}
.counter button {
  width: 24px; height: 24px;
  display: grid; place-items: center; color: var(--slate-700); font-size: 15px; font-weight: 500;
}
.counter button:hover { background: var(--slate-100); }
.counter button:disabled { color: var(--slate-300); cursor: not-allowed; background: white; }
.counter-value {
  width: 28px; text-align: center; font-size: 12px; font-weight: 600;
  color: var(--slate-800); border-left: 1px solid var(--slate-200);
  border-right: 1px solid var(--slate-200); font-variant-numeric: tabular-nums;
  padding: 2px 0;
}

/* ============ 자동 산정 ============ */
.calc-section { padding: 16px 20px; background: rgba(248, 250, 252, 0.4); }
.calc-list { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; }
.calc-row { display: flex; align-items: center; gap: 12px; padding: 6px 0; }
.calc-icon {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--indigo-50); color: var(--indigo-600);
  display: grid; place-items: center; flex-shrink: 0;
}
.calc-row.zero .calc-icon { background: var(--slate-100); color: var(--slate-400); }
.calc-main { flex: 1; min-width: 0; }
.calc-label { font-size: 12px; font-weight: 500; color: var(--slate-700); display: flex; align-items: center; gap: 6px; }
.calc-formula { font-size: 11px; color: var(--slate-500); margin-top: 2px; font-family: ui-monospace, monospace; }
.calc-hint { font-size: 10px; color: var(--slate-400); margin-top: 2px; }
.calc-amount { font-size: 14px; font-weight: 600; color: var(--slate-900); font-variant-numeric: tabular-nums; }
.calc-row.zero .calc-amount { color: var(--slate-400); }
.calc-amount-unit { font-size: 10px; color: var(--slate-400); margin-left: 1px; font-weight: 400; }
.badge-amber {
  font-size: 10px; padding: 2px 6px; border-radius: 4px;
  background: var(--amber-50); color: var(--amber-700); border: 1px solid var(--amber-100); font-weight: 500;
}
.meals-formula {
  font-size: 11px; color: var(--slate-500); margin-top: 4px;
  display: flex; align-items: center; flex-wrap: wrap; gap: 4px 8px;
  font-family: ui-monospace, monospace;
}
.meals-arrow { color: var(--slate-300); }
.meals-result { color: var(--slate-700); font-weight: 600; }

/* ============ 합계 ============ */
.total-section {
  margin-top: 16px; padding-top: 16px;
  border-top: 2px solid var(--slate-300);
  display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; flex-wrap: wrap;
}
.total-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--slate-500); }
.total-formula { font-size: 11px; color: var(--slate-500); margin-top: 2px; font-family: ui-monospace, monospace; }
.total-amount { font-size: 36px; font-weight: 700; color: var(--indigo-700); font-variant-numeric: tabular-nums; line-height: 1.1; }
.total-amount-unit { font-size: 16px; color: var(--slate-500); font-weight: 400; margin-left: 4px; }

/* ============ 미리보기 테이블 ============ */
.preview-wrap { padding: 0 20px 20px; }
.preview-table-box { border: 1px solid var(--slate-200); border-radius: 6px; overflow: hidden; margin-bottom: 12px; }
.preview-table { width: 100%; font-size: 12px; border-collapse: collapse; }
.preview-table thead { background: var(--slate-50); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--slate-500); }
.preview-table th, .preview-table td { padding: 6px 8px; text-align: left; }
.preview-table th { font-weight: 500; }
.preview-table .text-right { text-align: right; }
.preview-table tbody tr { background: rgba(238, 242, 255, 0.5); }
.preview-table .truncate { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ============ 버튼 ============ */
.btn-row { display: flex; gap: 8px; }
.btn-secondary {
  padding: 8px 12px; font-size: 14px;
  border: 1px solid var(--slate-300); border-radius: 6px;
  background: white; color: var(--slate-700);
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-secondary:hover { background: var(--slate-50); }
.btn-primary {
  flex: 1; padding: 10px;
  background: var(--indigo-600); color: white;
  font-size: 14px; font-weight: 500; border-radius: 6px;
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-primary:hover { background: var(--indigo-700); }

/* ============ 우측: 출장대장 ============ */
.ledger-card { background: white; border: 1px solid var(--slate-200); border-radius: 8px; position: sticky; top: 16px; }
.ledger-header { padding: 14px 20px; border-bottom: 1px solid var(--slate-200); display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.ledger-title { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.ledger-subtitle { font-size: 10px; color: var(--slate-400); font-weight: 400; }
.ledger-meta { font-size: 11px; color: var(--slate-500); margin-top: 2px; }
.ledger-meta b { color: var(--slate-700); font-weight: 600; }
.ledger-export {
  font-size: 12px; padding: 6px 10px;
  border: 1px solid var(--slate-200); border-radius: 6px;
  background: white; display: inline-flex; align-items: center; gap: 4px;
}
.ledger-export:hover { background: var(--slate-50); }
.ledger-filter { padding: 8px 12px; border-bottom: 1px solid var(--slate-100); display: flex; align-items: center; gap: 8px; }
.ledger-search { flex: 1; position: relative; }
.ledger-search-input {
  width: 100%; padding: 6px 8px 6px 28px;
  font-size: 12px; border: 1px solid var(--slate-200);
  border-radius: 4px; background: white;
}
.ledger-search-input:focus { outline: none; border-color: var(--indigo-600); }
.ledger-search-icon { position: absolute; left: 8px; top: 7px; color: var(--slate-400); pointer-events: none; }
.ledger-filter-btn {
  font-size: 11px; padding: 6px 8px;
  border: 1px solid var(--slate-200); border-radius: 4px;
  display: inline-flex; align-items: center; gap: 4px; background: white;
}
.ledger-filter-btn:hover { background: var(--slate-50); }
.ledger-scroll { max-height: 700px; overflow-y: auto; }
.ledger-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.ledger-table thead {
  background: rgba(248, 250, 252, 0.95);
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--slate-500); position: sticky; top: 0;
}
.ledger-table th, .ledger-table td { padding: 8px; text-align: left; }
.ledger-table th { font-weight: 500; }
.ledger-table th.text-right, .ledger-table td.text-right { text-align: right; }
.ledger-table th.text-center, .ledger-table td.text-center { text-align: center; }
.ledger-table tbody tr { border-top: 1px solid var(--slate-100); transition: background 0.15s; }
.ledger-table tbody tr:hover { background: rgba(248, 250, 252, 0.7); }
.ledger-table tbody tr.just-added { background: var(--emerald-50); animation: highlight 2.4s; }
@keyframes highlight {
  0%, 30% { background: var(--emerald-50); }
  100% { background: white; }
}
.ledger-no { color: var(--slate-400); font-family: monospace; font-size: 11px; font-variant-numeric: tabular-nums; width: 32px; }
.ledger-title-cell { max-width: 230px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ledger-biz { font-size: 10px; color: var(--slate-400); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ledger-traveler { white-space: nowrap; }
.ledger-amount { font-variant-numeric: tabular-nums; font-weight: 500; }

/* ============ 영수증 편집기 (대중교통) ============ */
.receipt-editor {
  margin: 2px 0 8px 44px;
  padding: 10px 12px;
  border: 1px dashed var(--slate-200);
  border-radius: 6px;
  background: white;
}
.receipt-row {
  display: grid;
  grid-template-columns: 1fr 110px 18px 26px;
  align-items: center;
  gap: 6px;
  padding: 3px 0;
}
.receipt-label {
  font-size: 12px;
  border: 1px solid transparent;
  background: transparent;
  padding: 5px 7px;
  border-radius: 4px;
  color: var(--slate-700);
  width: 100%;
  min-width: 0;
}
.receipt-label:hover { background: var(--slate-50); border-color: var(--slate-200); }
.receipt-label:focus { background: white; border-color: var(--indigo-600); outline: none; }
.receipt-amount {
  font-size: 12px;
  text-align: right;
  border: 1px solid var(--slate-200);
  border-radius: 4px;
  padding: 5px 7px;
  font-variant-numeric: tabular-nums;
  font-weight: 600;
  color: var(--slate-900);
  background: white;
  width: 100%;
  -moz-appearance: textfield;
}
.receipt-amount::-webkit-outer-spin-button,
.receipt-amount::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.receipt-amount:focus { outline: none; border-color: var(--indigo-600); }
.receipt-unit { font-size: 10px; color: var(--slate-500); }
.receipt-delete {
  width: 22px; height: 22px;
  display: grid; place-items: center;
  color: var(--slate-400);
  border-radius: 4px;
  font-size: 18px;
  line-height: 1;
}
.receipt-delete:hover { background: #fee2e2; color: #dc2626; }
.receipt-add {
  width: 100%; margin-top: 6px; padding: 6px 8px;
  font-size: 11.5px; color: var(--indigo-600);
  border: 1px dashed #c7d2fe;
  border-radius: 6px; background: white; font-weight: 500;
  transition: all 0.1s;
}
.receipt-add:hover { background: var(--indigo-50); border-color: var(--indigo-600); border-style: solid; }

/* ============ Pill ============ */
.pill { display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 500; }
.pill-slate { background: var(--slate-100); color: var(--slate-700); }
.pill-sky { background: var(--sky-50); color: var(--sky-700); border: 1px solid var(--sky-100); }
.pill-violet { background: var(--violet-50); color: var(--violet-700); border: 1px solid var(--violet-100); }
.pill-emerald { background: var(--emerald-50); color: var(--emerald-700); border: 1px solid var(--emerald-100); }
.pill-amber { background: var(--amber-50); color: var(--amber-700); border: 1px solid var(--amber-100); }

/* ============ 일자별 유가 카드 ============ */
.right-col { display: flex; flex-direction: column; gap: 16px; }
.fuel-card { background: white; border: 1px solid var(--slate-200); border-radius: 8px; overflow: hidden; }
.fuel-header { padding: 14px 20px; border-bottom: 1px solid var(--slate-200); display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.fuel-title { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.fuel-title-tag { font-size: 9px; font-weight: 600; color: var(--amber-700); background: var(--amber-50); border: 1px solid var(--amber-100); padding: 2px 5px; border-radius: 3px; }
.fuel-subtitle { font-size: 11px; color: var(--slate-500); margin-top: 2px; }
.fuel-list-wrap { max-height: 360px; overflow-y: auto; }
.fuel-row {
  display: grid;
  grid-template-columns: 78px 32px 1fr 60px;
  align-items: center;
  gap: 10px;
  padding: 7px 20px 7px 17px;
  font-size: 12px;
  border-top: 1px solid var(--slate-100);
  transition: background 0.1s;
}
.fuel-row:first-child { border-top: none; }
.fuel-row:hover { background: var(--slate-50); }
.fuel-row.current {
  background: var(--indigo-50);
  border-left: 3px solid var(--indigo-600);
  padding-left: 17px;
}
.fuel-row.current .fuel-date { color: var(--indigo-700); font-weight: 600; }
.fuel-date { color: var(--slate-700); font-family: ui-monospace, monospace; font-size: 11px; font-variant-numeric: tabular-nums; }
.fuel-weekday {
  font-size: 10px;
  text-align: center;
  padding: 1px 0;
  background: var(--slate-100);
  color: var(--slate-600);
  border-radius: 4px;
  font-weight: 500;
}
.fuel-weekday.sat { background: #dbeafe; color: #1d4ed8; }
.fuel-weekday.sun { background: #fee2e2; color: #b91c1c; }
.fuel-price { font-weight: 600; font-variant-numeric: tabular-nums; text-align: right; color: var(--slate-900); }
.fuel-price-unit { font-size: 10px; color: var(--slate-400); margin-left: 1px; font-weight: 400; }
.fuel-row.current .fuel-price { color: var(--indigo-700); }
.fuel-delta { font-size: 10.5px; text-align: right; font-variant-numeric: tabular-nums; }
.fuel-delta.up { color: #dc2626; }
.fuel-delta.down { color: #2563eb; }
.fuel-delta.flat { color: var(--slate-400); }
.fuel-footer {
  padding: 8px 16px;
  background: var(--slate-50);
  font-size: 10px;
  color: var(--slate-500);
  border-top: 1px solid var(--slate-200);
  display: flex; align-items: center; justify-content: space-between;
}
.fuel-current-pill {
  font-size: 9px; font-weight: 600;
  color: var(--indigo-700); background: white;
  border: 1px solid #c7d2fe;
  padding: 1px 5px; border-radius: 3px;
}
</style>
</head>
<body>
<div id="app"></div>

<script>
"use strict";

function compute() {
  const isDriver     = state.mode === "self_drive";
  const isPassenger  = state.mode === "self_passenger";
  const isCompanyCar = state.mode === "company_car";
  const isPublic     = state.mode === "public_transit";
  const halfPerDiem  = isPassenger || isCompanyCar;

  const fuelCost   = isDriver ? CURRENT.fuelCostRaw   : 0;
  const tollSum    = isDriver ? CURRENT.tollSumRaw    : 0;
  const publicCost = isPublic ? state.publicReceipts.reduce((s, r) => s + (r.amount || 0), 0) : 0;
  const billedMeals = Math.max(0, CURRENT.days * 3 - state.mealsProvided);
  const mealCost = mealAmount(billedMeals);
  const perDiemFull = 25000 * CURRENT.days;
  const perDiem = halfPerDiem ? Math.round(perDiemFull / 2) : perDiemFull;
  const regionInfo = REGION_RATES[state.region];
  const lodgeCost = state.nights * regionInfo.rate;
  const total = fuelCost + tollSum + publicCost + mealCost + perDiem + lodgeCost;

  return { fuelCost, tollSum, publicCost, mealCost, perDiem, lodgeCost, total,
           billedMeals, regionInfo, isDriver, isPassenger, isCompanyCar, isPublic, halfPerDiem };
}

function fmt(n) { return n.toLocaleString(); }
function setState(patch) { Object.assign(state, patch); render(); }

function addToLedger() {
  const c = compute();
  const newRow = {
    no: state.ledger[0].no + 1,
    title: CURRENT.title, traveler: CURRENT.traveler,
    amount: c.total, date: "2026-06-23",
    biz: CURRENT.biz, fund: CURRENT.fund,
  };
  state.ledger = [newRow, ...state.ledger];
  state.justAdded = newRow.no;
  render();
  setTimeout(() => { state.justAdded = null; render(); }, 2400);
}

let _focusHint = null;
function captureFocus() {
  const ae = document.activeElement;
  if (ae && (ae.classList.contains("receipt-amount") || ae.classList.contains("receipt-label"))) {
    const row = ae.closest(".receipt-row");
    _focusHint = {
      rid: row?.dataset.rid,
      cls: ae.classList.contains("receipt-amount") ? "receipt-amount" : "receipt-label",
      caret: ae.type === "text" ? ae.selectionStart : null,
    };
  } else { _focusHint = null; }
}
function restoreFocus() {
  if (!_focusHint) return;
  const sel = `.receipt-row[data-rid="${_focusHint.rid}"] .${_focusHint.cls}`;
  const el = document.querySelector(sel);
  if (el) {
    el.focus();
    if (_focusHint.caret != null && el.type === "text") {
      try { el.setSelectionRange(_focusHint.caret, _focusHint.caret); } catch (_) {}
    }
  }
  _focusHint = null;
}

            <div class="calc-row ${c.mealCost === 0 ? "zero" : ""}">
              <div class="calc-icon">${ICON.receipt}</div>
              <div class="calc-main">
                <div class="calc-label">식비</div>
                <div class="meals-formula">
                  <span>기본 ${CURRENT.days * 3}식</span>
                  <span>−</span>
                  <span>제공받음</span>
                  ${counterHtml("meals", state.mealsProvided, 0, CURRENT.days * 3)}
                  <span>식</span>
                  <span class="meals-arrow">→</span>
                  <span class="meals-result">${c.billedMeals}식 지급</span>
                </div>
              </div>
              <div class="calc-amount">${fmt(c.mealCost)}<span class="calc-amount-unit">원</span></div>
            </div>

            ${calcRowHtml({
              icon: ICON.banknote, label: "일비",
              formula: c.halfPerDiem
                ? `25,000원 × ${CURRENT.days}일 × 50% (${halfPerDiemReason})`
                : `25,000원 × ${CURRENT.days}일`,
              amount: c.perDiem, badge: c.halfPerDiem ? "50% 적용" : null,
            })}

            ${calcRowHtml({
              icon: ICON.bed, label: "숙박비",
              formula: state.nights > 0
                ? `${c.regionInfo.label} ${fmt(c.regionInfo.rate)}원 × ${state.nights}박`
                : "0박 · 미지급",
              amount: c.lodgeCost, zero: c.lodgeCost === 0,
            })}
          </div>

          <div class="total-section">
            <div>
              <div class="total-label">정산 합계</div>
              <div class="total-formula">${[
                c.fuelCost   ? `유류 ${fmt(c.fuelCost)}`     : null,
                c.tollSum    ? `톨게이트 ${fmt(c.tollSum)}`   : null,
                c.publicCost ? `교통 ${fmt(c.publicCost)}`    : null,
                c.mealCost   ? `식비 ${fmt(c.mealCost)}`      : null,
                c.perDiem    ? `일비 ${fmt(c.perDiem)}`       : null,
                c.lodgeCost  ? `숙박 ${fmt(c.lodgeCost)}`     : null,
              ].filter(Boolean).join(" + ")}</div>
            </div>
            <div class="total-amount">${fmt(c.total)}<span class="total-amount-unit">원</span></div>
          </div>
        </div>
      </div>

      <!-- 3. 대장 추가 -->
      <div class="card">
        <div class="card-header">
          <div class="card-header-num">3</div>
          <div class="card-header-title">출장대장에 추가</div>
        </div>
        <div class="preview-wrap">
          <div class="preview-table-box">
            <table class="preview-table">
              <thead>
                <tr>
                  <th>제목</th><th>출장자</th><th class="text-right">출장비</th>
                  <th>자금집행일</th><th>사업비/시스템</th><th>예산명</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td class="truncate">${CURRENT.title}</td>
                  <td>${CURRENT.traveler}</td>
                  <td class="text-right tabular" style="font-weight:600">${fmt(c.total)}</td>
                  <td class="mono" style="font-size:11px">2026-06-23</td>
                  <td>${CURRENT.fund}</td>
                  <td>${CURRENT.biz}</td>
                </tr>
              </tbody>
            </table>
          </div>
          <div class="btn-row">
            <button class="btn-secondary">${ICON.edit13} 수정</button>
            <button class="btn-primary" data-action="add-ledger">${ICON.plus15} 출장대장에 추가하고 다음 건으로</button>
          </div>
        </div>
      </div>
    </section>

    <!-- 우측: 일자별 유가 + 출장대장 -->
    <aside class="right-col">
      <div class="fuel-card">
        <div class="fuel-header">
          <div>
            <div class="fuel-title">
              오파넷 일자별 유가
              <span class="fuel-title-tag">MOCK</span>
            </div>
            <div class="fuel-subtitle">보통휘발유 평균가 · 최근 14일</div>
          </div>
          <button class="ledger-export" disabled style="opacity:0.6">${ICON.download11} 새로고침</button>
        </div>
        <div class="fuel-list-wrap">
          ${FUEL_PRICES.map(p => {
            const isCurrent = p.date === CURRENT.date;
            const wkCls = p.weekday === "토" ? "sat" : p.weekday === "일" ? "sun" : "";
            const deltaCls = p.delta > 0 ? "up" : p.delta < 0 ? "down" : "flat";
            const deltaText = p.delta > 0 ? `▲ ${p.delta}` : p.delta < 0 ? `▼ ${Math.abs(p.delta)}` : "—";
            return `
              <div class="fuel-row ${isCurrent ? "current" : ""}">
                <span class="fuel-date">${p.date}</span>
                <span class="fuel-weekday ${wkCls}">${p.weekday}</span>
                <span class="fuel-price">${fmt(p.price)}<span class="fuel-price-unit">원/L</span></span>
                <span class="fuel-delta ${deltaCls}">${deltaText}</span>
              </div>`;
          }).join("")}
        </div>
        <div class="fuel-footer">
          <span>출장일 <b style="color:var(--indigo-700)">${CURRENT.date}</b> 자동 적용 <span class="fuel-current-pill">${fmt(CURRENT.fuelPrice)}원/L</span></span>
          <span>API 연동 예정</span>
        </div>
      </div>

      <div class="ledger-card">
        <div class="ledger-header">
          <div>
            <h2 class="ledger-title">
              출장대장
              <span class="ledger-subtitle">2026년 국내 출장</span>
            </h2>
            <div class="ledger-meta">
              누계 <b>${ledgerTotal}건</b> · 이달 합계 <b class="tabular">${fmt(ledgerMonthSum)}원</b>
            </div>
          </div>
          <button class="ledger-export">${ICON.download11} XLSX</button>
        </div>
        <div class="ledger-filter">
          <div class="ledger-search">
            <span class="ledger-search-icon">${ICON.search12}</span>
            <input class="ledger-search-input" placeholder="제목 · 출장자 검색" />
          </div>
          <button class="ledger-filter-btn">전체 ${ICON.chevronDown11}</button>
        </div>
        <div class="ledger-scroll">
          <table class="ledger-table">
            <thead>
              <tr>
                <th style="width:32px">No.</th>
                <th>제목</th><th>출장자</th>
                <th class="text-right">출장비</th>
                <th class="text-center">시스템</th>
              </tr>
            </thead>
            <tbody>
              ${state.ledger.map(r => `
                <tr class="${state.justAdded === r.no ? "just-added" : ""}">
                  <td class="ledger-no">${r.no}</td>
                  <td>
                    <div class="ledger-title-cell">${r.title}</div>
                    <div class="ledger-biz">${r.biz}</div>
                  </td>
                  <td class="ledger-traveler">${r.traveler}</td>
                  <td class="text-right ledger-amount">${fmt(r.amount)}</td>
                  <td class="text-center">${pillHtml(r.fund)}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      </div>
    </aside>
  </main>
  `;
  bindEvents();
}

/* ============ HTML 헬퍼 ============ */
function counterHtml(key, value, min, max) {
  return `
    <div class="counter">
      <button data-action="dec" data-counter="${key}" ${value <= min ? "disabled" : ""}>−</button>
      <span class="counter-value">${value}</span>
      <button data-action="inc" data-counter="${key}" ${value >= max ? "disabled" : ""}>+</button>
    </div>`;
}
function calcRowHtml({ icon, label, formula, hint, amount, zero, badge }) {
  return `
    <div class="calc-row ${zero ? "zero" : ""}">
      <div class="calc-icon">${icon}</div>
      <div class="calc-main">
        <div class="calc-label">
          ${label}
          ${badge ? `<span class="badge-amber">${badge}</span>` : ""}
        </div>
        <div class="calc-formula">${formula}</div>
        ${hint ? `<div class="calc-hint">${hint}</div>` : ""}
      </div>
      <div class="calc-amount">${fmt(amount)}<span class="calc-amount-unit">원</span></div>
    </div>`;
}
function pillHtml(fund) {
  const cls = { "통장": "pill-slate", "e나라": "pill-sky", "RCMS": "pill-violet", "보탬e": "pill-emerald", "지방비": "pill-amber" }[fund] || "pill-slate";
  return `<span class="pill ${cls}">${fund}</span>`;
}

/* ============ 이벤트 바인딩 ============ */
function bindEvents() {
  document.querySelectorAll('[data-action="set-mode"]').forEach(b => {
    b.addEventListener("click", () => setState({ mode: b.dataset.mode }));
  });
  document.querySelectorAll('[data-action="inc"], [data-action="dec"]').forEach(b => {
    b.addEventListener("click", () => {
      const key = b.dataset.counter;
      const delta = b.dataset.action === "inc" ? 1 : -1;
      const max = key === "companions" ? 9 : key === "nights" ? 30 : key === "meals" ? CURRENT.days * 3 : 99;
      const stateKey = key === "meals" ? "mealsProvided" : key;
      const next = Math.max(0, Math.min(max, state[stateKey] + delta));
      setState({ [stateKey]: next });
    });
  });
  const regionSel = document.getElementById("region-select");
  if (regionSel) regionSel.addEventListener("change", e => setState({ region: e.target.value }));

  const addBtn = document.querySelector('[data-action="add-ledger"]');
  if (addBtn) addBtn.addEventListener("click", addToLedger);

  // 영수증 편집 ──────────────────────────────────
  document.querySelectorAll(".receipt-amount").forEach(input => {
    input.addEventListener("input", () => {
      const rid = parseInt(input.closest(".receipt-row").dataset.rid);
      const r = state.publicReceipts.find(x => x.id === rid);
      if (r) { r.amount = parseInt(input.value) || 0; render(); }
    });
  });
  document.querySelectorAll(".receipt-label").forEach(input => {
    input.addEventListener("input", () => {
      const rid = parseInt(input.closest(".receipt-row").dataset.rid);
      const r = state.publicReceipts.find(x => x.id === rid);
      if (r) { r.label = input.value; render(); }
    });
  });
  document.querySelectorAll(".receipt-delete").forEach(btn => {
    btn.addEventListener("click", () => {
      const rid = parseInt(btn.closest(".receipt-row").dataset.rid);
      state.publicReceipts = state.publicReceipts.filter(r => r.id !== rid);
      render();
    });
  });
  const receiptAddBtn = document.querySelector(".receipt-add");
  if (receiptAddBtn) {
    receiptAddBtn.addEventListener("click", () => {
      state.publicReceipts.push({ id: state.nextReceiptId++, label: "", amount: 0 });
      render();
    });
  }

  restoreFocus();
}

/* 초기 렌더 */
render();
</script>
</body>
</html>
